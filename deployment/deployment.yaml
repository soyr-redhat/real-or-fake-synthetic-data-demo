apiVersion: apps/v1
kind: Deployment
metadata:
  name: realorfake-backend
  namespace: real-or-fake
  labels:
    app: realorfake-backend
    pillar: synthetic-data
  annotations:
    image.openshift.io/triggers: '[{"from":{"kind":"ImageStreamTag","name":"realorfake-backend:latest"},"fieldPath":"spec.template.spec.containers[?(@.name==\"backend\")].image"}]'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: realorfake-backend
  template:
    metadata:
      labels:
        app: realorfake-backend
    spec:
      volumes:
      - name: leaderboard-storage
        persistentVolumeClaim:
          claimName: leaderboard-storage
      containers:
      - name: backend
        image: image-registry.openshift-image-registry.svc:5000/real-or-fake/realorfake-backend:latest
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: LLM_API_URL
          valueFrom:
            configMapKeyRef:
              name: real-or-fake-config
              key: llm-api-url
        - name: LLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: real-or-fake-secrets
              key: llm-api-key
        - name: MODEL_NAME
          valueFrom:
            configMapKeyRef:
              name: real-or-fake-config
              key: model-name
        - name: LEADERBOARD_PATH
          value: /data/leaderboard.json
        volumeMounts:
        - name: leaderboard-storage
          mountPath: /data
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: realorfake-backend
  namespace: real-or-fake
  labels:
    app: realorfake-backend
spec:
  selector:
    app: realorfake-backend
  ports:
  - port: 8000
    targetPort: 8000
    name: http
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: realorfake-backend
  namespace: real-or-fake
  labels:
    app: realorfake-backend
spec:
  to:
    kind: Service
    name: realorfake-backend
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: realorfake-frontend
  namespace: real-or-fake
  labels:
    app: realorfake-frontend
    pillar: synthetic-data
  annotations:
    image.openshift.io/triggers: '[{"from":{"kind":"ImageStreamTag","name":"realorfake-frontend:latest"},"fieldPath":"spec.template.spec.containers[?(@.name==\"frontend\")].image"}]'
spec:
  replicas: 2
  selector:
    matchLabels:
      app: realorfake-frontend
  template:
    metadata:
      labels:
        app: realorfake-frontend
    spec:
      containers:
      - name: frontend
        image: image-registry.openshift-image-registry.svc:5000/real-or-fake/realorfake-frontend:latest
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: realorfake-frontend
  namespace: real-or-fake
  labels:
    app: realorfake-frontend
spec:
  selector:
    app: realorfake-frontend
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: real-or-fake
  namespace: real-or-fake
  labels:
    app: realorfake-frontend
spec:
  to:
    kind: Service
    name: realorfake-frontend
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
