name: Deploy to OpenShift

on:
  push:
    branches:
      - main
    paths:
      - '2_synthetic_data/backend/**'
      - '2_synthetic_data/frontend/**'
      - '2_synthetic_data/deployment/**'
      - '2_synthetic_data/.github/workflows/deploy-to-openshift.yml'

env:
  NAMESPACE: real-or-fake
  OCP_SERVER: https://api.ocp.cloud.rhai-tmm.dev:6443

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy to OpenShift

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install OpenShift CLI
        run: |
          curl -LO https://mirror.openshift.com/pub/openshift-v4/clients/ocp/stable/openshift-client-linux.tar.gz
          tar -xzf openshift-client-linux.tar.gz
          sudo mv oc /usr/local/bin/
          oc version --client

      - name: Login to OpenShift
        run: |
          oc login --token="${{ secrets.OPENSHIFT_LOGIN_TOKEN }}" --server=${{ env.OCP_SERVER }} --insecure-skip-tls-verify

      - name: Verify namespace exists
        run: |
          oc get namespace ${{ env.NAMESPACE }} || oc new-project ${{ env.NAMESPACE }}

      - name: Apply secrets
        run: |
          cat <<EOF | oc apply -f -
          apiVersion: v1
          kind: Secret
          metadata:
            name: real-or-fake-secrets
            namespace: ${{ env.NAMESPACE }}
          type: Opaque
          stringData:
            llm-api-key: "${{ secrets.LLM_API_KEY }}"
          EOF

      - name: Apply ConfigMap
        run: |
          oc apply -f 2_synthetic_data/deployment/configmap.yaml -n ${{ env.NAMESPACE }}

      - name: Apply PVC
        run: |
          oc apply -f 2_synthetic_data/deployment/pvc.yaml -n ${{ env.NAMESPACE }}

      - name: Apply BuildConfig and ImageStreams
        run: |
          oc apply -f 2_synthetic_data/deployment/buildconfig.yaml -n ${{ env.NAMESPACE }}

      - name: Trigger builds and wait
        run: |
          echo "Starting backend build..."
          BACKEND_BUILD=$(oc start-build realorfake-backend -n ${{ env.NAMESPACE }} -o name)
          echo "Backend build: $BACKEND_BUILD"

          echo "Starting frontend build..."
          FRONTEND_BUILD=$(oc start-build realorfake-frontend -n ${{ env.NAMESPACE }} -o name)
          echo "Frontend build: $FRONTEND_BUILD"

          echo "Waiting for builds to complete..."
          oc wait --for=condition=Complete --timeout=10m $BACKEND_BUILD -n ${{ env.NAMESPACE }}
          oc wait --for=condition=Complete --timeout=10m $FRONTEND_BUILD -n ${{ env.NAMESPACE }}

          echo "Both builds completed successfully!"

      - name: Apply deployment manifests
        run: |
          oc apply -f 2_synthetic_data/deployment/deployment.yaml -n ${{ env.NAMESPACE }}

      - name: Trigger deployment rollout
        run: |
          oc rollout restart deployment/realorfake-backend -n ${{ env.NAMESPACE }}
          oc rollout restart deployment/realorfake-frontend -n ${{ env.NAMESPACE }}

      - name: Wait for deployments to be ready
        run: |
          oc rollout status deployment/realorfake-backend -n ${{ env.NAMESPACE }} --timeout=5m
          oc rollout status deployment/realorfake-frontend -n ${{ env.NAMESPACE }} --timeout=5m

      - name: Get application URL
        run: |
          echo "🚀 Application deployed successfully!"
          echo "URL: https://$(oc get route real-or-fake -n ${{ env.NAMESPACE }} -o jsonpath='{.spec.host}')"

      - name: Cleanup old builds and build pods
        run: |
          echo "Cleaning up completed builds and build pods..."

          # Delete old build objects (keep only latest 3)
          OLD_BACKEND=$(oc get builds -n ${{ env.NAMESPACE }} -l buildconfig=realorfake-backend --sort-by=.metadata.creationTimestamp -o name | head -n -3)
          if [ -n "$OLD_BACKEND" ]; then
            echo "Deleting old backend builds: $OLD_BACKEND"
            echo "$OLD_BACKEND" | xargs oc delete -n ${{ env.NAMESPACE }}
          fi

          OLD_FRONTEND=$(oc get builds -n ${{ env.NAMESPACE }} -l buildconfig=realorfake-frontend --sort-by=.metadata.creationTimestamp -o name | head -n -3)
          if [ -n "$OLD_FRONTEND" ]; then
            echo "Deleting old frontend builds: $OLD_FRONTEND"
            echo "$OLD_FRONTEND" | xargs oc delete -n ${{ env.NAMESPACE }}
          fi

          # Delete all completed build pods
          oc delete pods -n ${{ env.NAMESPACE }} --field-selector=status.phase==Succeeded -l openshift.io/build.name 2>/dev/null || echo "No completed build pods to clean"

          echo "Build cleanup complete"
